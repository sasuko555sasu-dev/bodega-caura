    <script type="module">
    // IMPORTANTE: Usa la misma versión 10.8.1 para todo
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, getDocs, getDoc, setDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
    import { addDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAP4RynOCmzuVfKNVUH9yTLn6zqbX-FpO8",
        authDomain: "bodegacaura.firebaseapp.com",
        projectId: "bodegacaura",
        storageBucket: "bodegacaura.firebasestorage.app",
        messagingSenderId: "122047399077",
        appId: "1:122047399077:web:59e6cad69ad96e7ff1f94c",
        measurementId: "G-35PWB70C08"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

        document.addEventListener("DOMContentLoaded", () => {
            // 1. Lógica para abrir el modal de encuesta
            const btnAbrirEncuesta = document.getElementById('btn-abrir-encuesta');
            if (btnAbrirEncuesta) {
                btnAbrirEncuesta.addEventListener('click', () => {
                    document.getElementById('modal-crear-encuesta').style.display = 'flex';
                });
            }

            
            // 2. Lógica para publicar la encuesta (MODIFICADA PARA MÚLTIPLES)
const btnPublicar = document.getElementById('btn-publicar');
if (btnPublicar) {
    btnPublicar.addEventListener('click', async () => {
        // 1. Mostrar estado de carga
        btnPublicar.innerText = "Publicando...";
        btnPublicar.classList.add('btn-cargando');
        btnPublicar.disabled = true; // Deshabilitar para evitar doble clic

        try {
            const data = {
                pregunta: document.getElementById('admin-pregunta').value,
                opciones: [
                    document.getElementById('admin-op1').value,
                    document.getElementById('admin-op2').value,
                    document.getElementById('admin-op3').value,
                    document.getElementById('admin-op4').value
                ].filter(op => op.trim() !== ""),
                fecha: new Date()
            };

            // Validar que no esté vacía la pregunta
            if(!data.pregunta) throw new Error("La pregunta es obligatoria");

            await addDoc(collection(db, "encuestas"), data);
            
            alert("¡Encuesta publicada!");
            document.getElementById('modal-crear-encuesta').style.display = 'none';
            document.getElementById('admin-pregunta').value = "";
            
        } catch (error) {
            console.error("Error al publicar:", error);
            alert("Error: " + error.message);
        } finally {
            // 2. Restaurar botón pase lo que pase
            btnPublicar.innerText = "Publicar Encuesta";
            btnPublicar.classList.remove('btn-cargando');
            btnPublicar.disabled = false;
        }
    });
}
            
        });
    </script>
